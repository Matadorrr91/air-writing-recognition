<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air-Writing — Ziffernerkennung</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2rem;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0f1117; color: #e7e9ee;
    }
    h1 { font-weight: 600; font-size: 1.3rem; color: #9aa3b2; letter-spacing: .02em; }
    #status { font-size: .85rem; color: #6b7280; }
    #status .dot { display: inline-block; width: .6rem; height: .6rem; border-radius: 50%;
      background: #ef4444; margin-right: .4rem; vertical-align: middle; }
    #status.connected .dot { background: #22c55e; }

    #latest {
      font-size: 9rem; font-weight: 700; line-height: 1; min-height: 9rem;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s ease, color .12s ease;
    }
    #latest.pulse { transform: scale(1.18); color: #60a5fa; }
    #latest.rejected { color: #f59e0b; }

    #sequence {
      font-size: 3rem; font-weight: 600; letter-spacing: .35rem;
      min-height: 3.5rem; padding: 0 1rem; word-break: break-all; text-align: center;
      color: #e7e9ee;
    }
    #sequence:empty::before { content: "—"; color: #374151; }

    .hint { font-size: .8rem; color: #6b7280; max-width: 28rem; text-align: center; }
    button {
      background: #1f2430; color: #e7e9ee; border: 1px solid #374151;
      border-radius: .5rem; padding: .5rem 1rem; font-size: .85rem; cursor: pointer;
    }
    button:hover { background: #283042; }
    .row { display: flex; gap: .75rem; align-items: center; }
  </style>
</head>
<body>
  <h1>Air-Writing — Ziffernerkennung</h1>
  <div id="status"><span class="dot"></span><span id="status-text">verbinde…</span></div>

  <div id="latest"></div>
  <div id="sequence" aria-live="polite"></div>

  <div class="row">
    <button id="clear">Folge löschen</button>
  </div>
  <p class="hint">
    Ziffer in die Luft schreiben → kurze Pause → nächste Ziffer.
    Bei unsicherer Erkennung erscheint kurz ein <b>?</b> (zu niedrige Confidence).
  </p>

  <script src="/app.js"></script>
</body>
</html>
